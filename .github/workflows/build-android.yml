name: Build Android APK

on:
  push:
    branches:
      - claude/create-mobile-app-CPYLh
    paths:
      - 'mobile/**'
      - '.github/workflows/**'
  workflow_dispatch:

jobs:
  build:
    name: Build Signed APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: claude/create-mobile-app-CPYLh

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install JS dependencies
        working-directory: mobile
        run: npm install --legacy-peer-deps

      - name: Verify patch applied
        run: grep -c "findByName" mobile/node_modules/expo-modules-core/android/ExpoModulesCorePlugin.gradle && echo "Patch OK"

      - name: Install Android SDK 35 and build-tools
        run: |
          SDKMANAGER="$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager"
          if [ ! -f "$SDKMANAGER" ]; then
            SDKMANAGER=$(find "$ANDROID_HOME" -name sdkmanager -type f 2>/dev/null | head -1)
          fi
          echo "sdkmanager: $SDKMANAGER"
          yes | "$SDKMANAGER" --licenses 2>/dev/null || true
          "$SDKMANAGER" "platforms;android-35" "build-tools;35.0.0" "ndk;26.1.10909125"

      - name: Make gradlew executable
        working-directory: mobile/android
        run: chmod +x gradlew

      - name: Build release APK
        working-directory: mobile/android
        run: |
          set +e
          ./gradlew assembleRelease --no-daemon --stacktrace 2>&1 | tee /tmp/gradle-build.log
          BUILD_EXIT=${PIPESTATUS[0]}
          echo "BUILD_EXIT=$BUILD_EXIT" >> $GITHUB_ENV
          exit $BUILD_EXIT
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME }}
          ANDROID_SDK_ROOT: ${{ env.ANDROID_HOME }}

      - name: Show root cause error
        if: failure()
        run: |
          echo "======== WHAT WENT WRONG ========"
          grep -A 10 "What went wrong" /tmp/gradle-build.log | head -60
          echo ""
          echo "======== CAUSED BY ========"
          grep -A 5 "Caused by\|cause:" /tmp/gradle-build.log | head -40
          echo ""
          echo "======== FIRST 80 LINES ========"
          head -80 /tmp/gradle-build.log

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: kinddate-release-apk
          path: mobile/android/app/build/outputs/apk/release/app-release.apk
          retention-days: 30

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gradle-build-log
          path: /tmp/gradle-build.log
          retention-days: 7
