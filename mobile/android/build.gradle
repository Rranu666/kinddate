// Top-level build file where you can add configuration options common to all sub-projects/modules.

buildscript {
    ext {
        buildToolsVersion = findProperty('android.buildToolsVersion') ?: '35.0.0'
        minSdkVersion = Integer.parseInt(findProperty('android.minSdkVersion') ?: '24')
        compileSdkVersion = Integer.parseInt(findProperty('android.compileSdkVersion') ?: '35')
        targetSdkVersion = Integer.parseInt(findProperty('android.targetSdkVersion') ?: '34')
        kotlinVersion = findProperty('android.kotlinVersion') ?: '1.9.24'

        ndkVersion = "26.1.10909125"
    }
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        classpath('com.android.tools.build:gradle')
        classpath('com.facebook.react:react-native-gradle-plugin')
        classpath("org.jetbrains.kotlin:kotlin-gradle-plugin:${kotlinVersion}")
    }
}

apply plugin: "com.facebook.react.rootproject"

allprojects {
    repositories {
        maven {
            // All of React Native (JS, Obj-C sources, Android binaries) is installed from npm
            url(new File(['node', '--print', "require.resolve('react-native/package.json')"].execute(null, rootDir).text.trim(), '../android'))
        }
        maven {
            // Android JSC is installed from npm
            url(new File(['node', '--print', "require.resolve('jsc-android/package.json', { paths: [require.resolve('react-native/package.json')] })"].execute(null, rootDir).text.trim(), '../dist'))
        }

        google()
        mavenCentral()
        maven { url 'https://www.jitpack.io' }
    }

    // Force androidx.core to 1.15.0 for ALL projects (app + every library module).
    // expo-notifications@55.0.18 declares core:1.17.0 which was compiled with AGP 8.9.1
    // and embeds a minAgpVersion that fails checkReleaseAarMetadata with our AGP 8.6.0.
    // 1.15.0 has all APIs needed by our SDK-55 Expo modules.
    configurations.all {
        resolutionStrategy {
            force 'androidx.core:core:1.15.0'
            force 'androidx.core:core-ktx:1.15.0'
        }
    }
}

// Allow the Kotlin 1.9.x compiler to compile against libraries whose AARs were built
// with Kotlin 2.x (K2): lifecycle:2.9.3, firebase-messaging:25.0.1, coroutines:1.10.x.
// The flag suppresses the "incompatible metadata version 2.1.0" error; the public API
// shape (method signatures, class names) encoded in the metadata is still fully readable
// by the 1.9.x reader.  This does NOT affect the compiled output bytecode.
//
// Uses plugins.withId() — the Gradle 8.x-safe alternative to afterEvaluate — so the
// task configuration fires the moment kotlin-android is applied to each subproject,
// regardless of evaluation order.
allprojects {
    plugins.withId("org.jetbrains.kotlin.android") {
        tasks.withType(org.jetbrains.kotlin.gradle.tasks.KotlinCompile).configureEach { task ->
            task.kotlinOptions.freeCompilerArgs += ["-Xskip-metadata-version-check"]
        }
    }
}
